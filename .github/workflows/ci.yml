name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  integration-test:
    name: Go integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        run: go test -tags=integration ./...

  smoke:
    name: Smoke (docker compose)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Start stack
        run: docker compose up -d --build

      - name: Smoke test
        run: bash .github/scripts/smoke.sh

      - name: App logs on failure
        if: failure()
        run: docker compose logs app

      - name: Tear down
        if: always()
        run: docker compose down -v

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  release:
    name: Publish image
    needs: [test, integration-test, smoke]
    runs-on: ubuntu-latest
    # only publish on direct pushes to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write # push tags
      packages: write # push to ghcr.io

    concurrency: # serialize releases (two merges can't claim the same patch)
      group: release
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Number of commits to fetch. 0 indicates all history for all branches and tags.
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: bash .github/scripts/next-version.sh

      - name: Set up QEMU # emulation for the small arm64 runtime-stage RUN steps
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.new_version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # tag after a successful build+push, failed builds leave no tag
      - name: Push git tag
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}
