openapi: 3.0.4 # TODO: bug with VSCode extension not supporting 3.1.x
info:
  title: Leaderboard Apex Service API
  version: 1.0.0
  description: An API for storing and retrieving player scores.
paths:
  /:
    get:
      summary: May be used to ping
      responses:
        "200":
          description: Successful response

  /api/v1/players:
    post:
      summary: Add a new player profile. Returns a generated ID.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerRequest"
      responses:
        "201":
          description: Player profile created (or replayed for a repeated Idempotency-Key)
          headers:
            Location:
              description: URL of the created player profile
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedIdResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: The Idempotency-Key was reused with a different player name
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards:
    get:
      summary: Lists all boards, in creation order
      responses:
        "200":
          description: All ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBoardsResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards/{board_id}:
    put:
      summary: Create a new board. The id is client-chosen and immutable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoardRequest"
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
      responses:
        "201":
          description: Board created
          headers:
            Location:
              description: URL of the created board
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: A board with this id already exists
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      summary: Get a board info by ID
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
      responses:
        "200":
          description: All ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: ID not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards/{board_id}/close:
    post:
      summary: Closes the board for score writes. Idempotent - closing a closed board is a no-op.
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
      responses:
        "204":
          description: Board is closed (no content)
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: ID not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards/{board_id}/open:
    post:
      summary: Opens a closed board. Idempotent - opening an active board is a no-op.
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
      responses:
        "204":
          description: Board is active (no content)
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: ID not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards/{board_id}/scores:
    get:
      summary: Lists players by score on a board, highest first
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
        - name: limit
          in: query
          required: false
          description: Page size
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Number of higher-ranked rows to skip
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: All ok (an unknown or empty board reads as an empty list)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScoresResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/players/{player_id}:
    get:
      summary: Retrieves a player's info by ID
      parameters:
        - $ref: "#/components/parameters/PlayerIdPath"
      responses:
        "200":
          description: All ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: ID not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards/{board_id}/scores/{player_id}/history:
    get:
      summary: Lists a player's score events on a board (ledger), newest first
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
        - $ref: "#/components/parameters/PlayerIdPath"
        - name: limit
          in: query
          required: false
          description: Max number of events to return (positive integer)
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: All ok (empty list if the player has no events on the board)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards/{board_id}/scores/{player_id}:
    get:
      summary: Retrieves a player's standing on a board (rank, score, total)
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
        - $ref: "#/components/parameters/PlayerIdPath"
      responses:
        "200":
          description: All ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: ID not found (player not ranked on this board)
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      summary: Sets a player's absolute score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetScoreRequest"
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
        - $ref: "#/components/parameters/PlayerIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      responses:
        "204":
          description: Score updated (no content)
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: ID not found
          content:
            text/plain:
              schema:
                type: string
        "409":
          description: Board is closed, or the Idempotency-Key was reused with a different request
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/boards/{board_id}/scores/{player_id}/increment:
    post:
      summary: Increments the score (supports negative values for decrementing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncrementScoreRequest"
      parameters:
        - $ref: "#/components/parameters/PlayerIdPath"
        - $ref: "#/components/parameters/BoardIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      responses:
        "204":
          description: Score incremented. 
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: ID not found
          content:
            text/plain:
              schema:
                type: string
        "409":
          description: Board is closed, or the Idempotency-Key was reused with a different request
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/admin/boards/{board_id}/projection/rebuild:
    post:
      summary: Rebuild one board's leaderboard projection from the score ledger
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
      responses:
        "204":
          description: Projection rebuilt (no content)
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Board ID not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/admin/boards/{board_id}/projection/verify:
    get:
      summary: Compare one board's live projection with a ledger replay
      parameters:
        - $ref: "#/components/parameters/BoardIdPath"
      responses:
        "200":
          description: Verification completed; an empty mismatch list means no drift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyProjectionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Board ID not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    CreatePlayerRequest:
      type: object
      additionalProperties: false
      required:
        - player_name
      properties:
        player_name:
          type: string

    CreateBoardRequest:
      type: object
      additionalProperties: false
      required:
        - board_name
      properties:
        board_name:
          type: string

    BoardResponse:
      type: object
      additionalProperties: false
      required:
        - board_id
        - board_name
        - status
        - created_at
      properties:
        board_id:
          type: string
          description: Client-chosen immutable id (a readable slug, not a UUID)
        board_name:
          type: string
          description: Mutable display name
        status:
          type: string
          enum: [active, closed]
          description: A closed board rejects score writes
        created_at:
          type: string
          format: date-time

    ListBoardsResponse:
      type: object
      additionalProperties: false
      required:
        - boards
      properties:
        boards:
          type: array
          description: All boards, in creation order
          items:
            $ref: "#/components/schemas/BoardResponse"

    IncrementScoreRequest:
      type: object
      additionalProperties: false
      required:
        - amount
      properties:
        amount:
          type: number
          format: double

    SetScoreRequest:
      type: object
      additionalProperties: false
      required:
        - player_score
      properties:
        player_score:
          type: number
          format: double

    PlayerDataResponse:
      type: object
      additionalProperties: false
      required:
        - player_id
        - player_name
      properties:
        player_id:
          type: string
        player_name:
          type: string

    GeneratedIdResponse:
      type: object
      additionalProperties: false
      required:
        - player_id
      properties:
        player_id:
          type: string
          description: The generated unique ID for a player entry

    HistoryEvent:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - amount
        - request_id
        - created_at
      properties:
        id:
          type: string
          description: Event ID
        type:
          type: string
          enum:
            - set
            - increment
        amount:
          type: number
          format: double
          description: Absolute value (set) or delta (increment)
        request_id:
          type: string
          description: Idempotency key the write used
        created_at:
          type: string
          format: date-time
          description: Event time (RFC3339)

    HistoryResponse:
      type: object
      additionalProperties: false
      required:
        - player_id
        - events
      properties:
        player_id:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEvent"

    ScoreEntry:
      type: object
      additionalProperties: false
      required:
        - player_id
        - score
        - rank
      properties:
        player_id:
          type: string
        score:
          type: number
          format: double
        rank:
          type: integer
          description: 1-based position on the leaderboard (rank 1 = highest score)

    RankResponse:
      type: object
      additionalProperties: false
      required:
        - player_id
        - rank
        - score
        - total
      properties:
        player_id:
          type: string
        rank:
          type: integer
          description: 1-based position on the leaderboard (rank 1 = highest score)
        score:
          type: number
          format: double
        total:
          type: integer
          description: Total ranked players (the denominator for rank)

    ListScoresResponse:
      type: object
      additionalProperties: false
      required:
        - scores
        - limit
        - offset
        - total
      properties:
        scores:
          type: array
          items:
            $ref: "#/components/schemas/ScoreEntry"
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
          description: Total ranked players on the board (ZCARD)

    ProjectionMismatch:
      type: object
      additionalProperties: false
      required:
        - board_id
        - player_id
        - live_score
        - live_present
        - replay_score
        - replay_present
      properties:
        board_id:
          type: string
        player_id:
          type: string
        live_score:
          type: number
          format: double
        live_present:
          type: boolean
        replay_score:
          type: number
          format: double
        replay_present:
          type: boolean

    VerifyProjectionResponse:
      type: object
      additionalProperties: false
      required:
        - mismatches
      properties:
        mismatches:
          type: array
          items:
            $ref: "#/components/schemas/ProjectionMismatch"

  parameters:
    PlayerIdPath:
      name: player_id
      in: path
      required: true
      description: player ID
      schema:
        type: string
    BoardIdPath:
      name: board_id
      in: path
      required: true
      description: leaderboard ID
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Optional key that makes a retried write a no-op. Reusing a key with a
        different operation or amount is rejected with 409. Records expire after 24h.
      schema:
        type: string
        maxLength: 128

  responses:
    InternalServerError:
      description: Internal Server Error
      content:
        text/plain:
          schema:
            type: string

    BadRequest:
      description: Bad Request
      content:
        text/plain:
          schema:
            type: string
